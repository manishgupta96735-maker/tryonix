<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>You're offline — TryOnix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#22c55e" />
    <style>
      * { box-sizing: border-box; }
      body { font: 15px/1.5 system-ui, -apple-system, sans-serif; background: #0b0f0d; color: #f1f5f2; display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 1.5rem; }
      .card { max-width: 26rem; width: 100%; text-align: center; padding: 2rem; }
      .icon { width: 72px; height: 72px; border-radius: 999px; background: #14261a; display: grid; place-items: center; margin: 0 auto 1.25rem; }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
      p { color: #94a3a0; margin: 0 0 1.5rem; }
      button { padding: 0.75rem 1.5rem; border-radius: 999px; font: 600 14px inherit; cursor: pointer; border: 0; background: #22c55e; color: #05170c; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      </div>
      <h1>You're offline</h1>
      <p>Check your connection and try again. TryOnix needs the internet to generate try-ons.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
